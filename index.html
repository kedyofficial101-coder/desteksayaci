<script>
function yukle() {
    let sayi = localStorage.getItem("destekSayi");

    if (sayi === null) {
        sayi = 0;
    }

    document.getElementById("sayi").innerText = sayi;

    if (localStorage.getItem("tiklandi") === "evet") {
        document.getElementById("btn").disabled = true;
        document.getElementById("mesaj").innerText = "Zaten destek oldunuz ❤️";
    }
}

function arttir() {
    if (localStorage.getItem("tiklandi") === "evet") {
        return;
    }

    let sayi = localStorage.getItem("destekSayi");

    if (sayi === null) {
        sayi = 0;
    }

    sayi = Number(sayi) + 1;

    localStorage.setItem("destekSayi", sayi);
    localStorage.setItem("tiklandi", "evet");

    document.getElementById("sayi").innerText = sayi;
    document.getElementById("btn").disabled = true;
    document.getElementById("mesaj").innerText = "Teşekkürler ❤️";
}

window.onload = yukle;
</script>
